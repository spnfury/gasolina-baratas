name: Auto-publish article (Localizaciones)

on:
  schedule:
    # Every day at 9:00 UTC (11:00 Spain)
    - cron: '0 9 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and publish article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NOCODB_API_URL: ${{ secrets.NOCODB_API_URL }}
          NOCODB_API_TOKEN: ${{ secrets.NOCODB_API_TOKEN }}
          NOCODB_TABLE_ID: ${{ secrets.NOCODB_TABLE_ID }}
          BLOG_TYPE: localizaciones
        run: node scripts/generate-article.mjs
